<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Me</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 50px auto;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      padding: 10px;
      width: 100%;
      background-color: black;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h2>Contact Me</h2>

  <form id="contact-form">
    <input 
      type="text" 
      id="name" 
      name="name"
      placeholder="Your Name" 
      required
    >

    <input 
      type="email" 
      id="email" 
      name="email"
      placeholder="Your Email" 
      required
    >

    <textarea 
      id="message" 
      name="message"
      placeholder="Your Message" 
      rows="5"
      required
    ></textarea>

    <button type="submit">Send Message</button>
  </form>

  <p id="status"></p>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  
  <script>
    const supabaseUrl = "https://lwxchekcielnuniblzae.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3eGNoZWtjaWVsbnVuaWJsemFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2ODgwODAsImV4cCI6MjA5MjI2NDA4MH0.YLaXxpoY4W55cFF1PXA_lSBEXO1pg0ZY8ENWbJ9oJ4E";

    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    const form = document.getElementById("contact-form");
    const status = document.getElementById("status");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const message = document.getElementById("message").value;

      const { error } = await supabase
  .from("Contacts")
  .insert([{ name, email, message }]);

if (error) {
  console.error(error);
  status.innerText = error.message;
} else {
  status.innerText = "Message sent!";
}
    });
  </script>

</body>
</html>
